<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Landing Page</title>
    <link rel="stylesheet" href="css/s12-tabliss-styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <main class="center">
      <div class="time" aria-label="Current time placeholder">12:34 PM</div>
      <div class="social" aria-label="Social platform links">
        <a class="social-link" href="https://github.com" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-github" aria-hidden="true"></i>
          <span class="label">GitHub</span>
        </a>
        <a class="social-link" href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-linkedin" aria-hidden="true"></i>
          <span class="label">LinkedIn</span>
        </a>
      </div>
    </main>
  </body>
</html>
