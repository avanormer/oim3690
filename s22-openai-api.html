<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Buddy Chatbot</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        max-width: 650px;
        margin: 40px auto;
        padding: 0 20px;
        background: linear-gradient(135deg, #f7f3ff, #fffaf4);
        color: #2b2b2b;
      }

      h2 {
        margin-bottom: 6px;
      }

      #chat {
        border: 1px solid #e2d7f3;
        border-radius: 18px;
        height: 420px;
        overflow-y: auto;
        padding: 16px;
        margin-bottom: 12px;
        background: white;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }

      .msg {
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .msg.user {
        text-align: right;
      }

      .msg.user span {
        background: #9b5de5;
        color: white;
        padding: 9px 13px;
        border-radius: 16px 16px 4px 16px;
        display: inline-block;
      }

      .msg.ai span {
        background: #f1edf8;
        padding: 9px 13px;
        border-radius: 16px 16px 16px 4px;
        display: inline-block;
      }

      #form {
        display: flex;
        gap: 8px;
      }

      #prompt {
        flex: 1;
        padding: 11px;
        border: 1px solid #ddd1ec;
        border-radius: 999px;
        font-size: 16px;
      }

      #prompt:focus {
        outline: none;
        border-color: #9b5de5;
        box-shadow: 0 0 0 3px rgba(155, 93, 229, 0.15);
      }

      button {
        padding: 10px 22px;
        border: none;
        border-radius: 999px;
        background: #9b5de5;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #8145cc;
      }

      button:disabled {
        background: #aaa;
      }
    </style>
  </head>

  <body>
    <h2>Study Buddy Chatbot</h2>
    <p>Ask for help with homework, planning, or quick study explanations.</p>

    <div id="chat"></div>

    <form id="form">
      <input
        id="prompt"
        type="text"
        placeholder="Ask your study buddy something..."
        required
      />
      <button type="submit">Ask</button>
    </form>

    <script>
      async function askAI(prompt) {
        const response = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            model: "gpt-5-nano",
            input: prompt,
          }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(
            data.error?.message || `API error: ${response.status}`,
          );
        }
        const message = data.output.find((item) => item.type === "message");
        return message.content[0].text;
      }

      const chat = document.getElementById("chat");
      const form = document.getElementById("form");
      const input = document.getElementById("prompt");
      const btn = form.querySelector("button");

      function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = `msg ${sender}`;
        div.innerHTML = `<span>${text}</span>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";
        btn.disabled = true;

        addMessage("Thinking through it...", "ai");
        const loadingMsg = chat.lastElementChild;

        try {
          const reply = await askAI(text);
          loadingMsg.querySelector("span").textContent = reply;
        } catch (err) {
          loadingMsg.querySelector("span").textContent =
            "Error: " + err.message;
        }
        btn.disabled = false;
        input.focus();
      });
    </script>
  </body>
</html>
