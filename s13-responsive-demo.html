<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: antiquewhite;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
        padding: 1rem;
        background-color: yellow;
      }
    @media (max-width: 768px) {
      .container {
        max-width: 100%;
        padding: 0.5rem;
        background-color: lightblue;
      }

      body {
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0.25rem;
        background-color: lightseagreen;
      }

      body {
        font-size: 12px;
      }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>My Responsive Page</h1>
      <p>This is a simple responsive page.</p>
    </div>
  </body>
</html>
