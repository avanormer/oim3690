<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Rating Display</title>
</head>
<body>
    <h1>Visual Star Rating</h1>
    <div id="stars"></div>

    <script>
        const rating = 3;
        const container = document.querySelector('#stars');
        let stars = '';

        for (let i = 0; i < 5; i++) {
            if (i < rating) {
                stars += '★';
            } else {
                stars += '☆';
            }
        }
        container.textContent = stars; // ★★★☆☆
    </script>
</body>
</html>
