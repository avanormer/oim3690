<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number">
    <button>Click</button>
    <p id="result"></p>

    <script>
      const btn = document.querySelector("button");
      const result = document.querySelector("#result");

      function doStuff1() {
        let total = 0;
        for (let i = 0; i <= 100; i++) {
          if (i % 2 == 0) {
            result.innerHTML += `${i} is even<br>`;
          } else {
            result.innerHTML += `${i} is odd<br>`;
          }
          total += i;
        }
        result.innerHTML += `<br>Total: ${total}`;
      }

      function doStuff2() {
        const colors = ["red", "green", "blue", "yellow", 'orange'];

        console.log(colors);
        for (let i = 0; i < colors.length; i++) {
          result.innerHTML += `${colors[i]}<br>`;
        }

      }

      let numbers = [];

      function doStuff3() {
        const input = document.querySelector("input");
        const num = parseInt(input.value);
        numbers.push(num);
        console.log(numbers);
        
        let total = 0;
        for (let i = 0; i < numbers.length; i++) {
          total += numbers[i];
        }
        result.innerHTML = `Total: ${total}`;
      }

      btn.addEventListener("click", doStuff3);
    </script>
  </body>
</html>
